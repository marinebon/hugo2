{{ define "main" }}
<main class="err404">

  <!-- ocean atmosphere -->
  <div class="err404__ocean" aria-hidden="true">
    <div class="err404__rays"></div>
    <div class="err404__particles" id="err404-particles"></div>
    <svg class="err404__wave" viewBox="0 0 1440 88" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,44 C240,80 480,10 720,44 C900,68 1080,14 1260,36 C1340,46 1400,30 1440,22 L1440,88 L0,88 Z" fill="var(--bg-page)"/>
    </svg>
  </div>

  <!-- hero -->
  <div class="err404__hero">
    <span class="eyebrow eyebrow--rule eyebrow--ondark">Signal lost · depth unknown</span>
    <div class="err404__numeral" aria-hidden="true">404</div>
    <h1 class="err404__title">Lost in the deep</h1>
    <p class="err404__lead">The page you were looking for has drifted out of range. Let us help you surface.</p>
  </div>

  <!-- search surface -->
  <section class="err404__surface">
    <div class="container" style="max-width:720px;">
      <p class="err404__hint" id="err404-hint">Searching for related content…</p>
      <div id="search"></div>
      <div class="err404__actions">
        <a href="{{ "" | relURL }}" class="btn btn--outline">↑ Return to surface</a>
        <a href="{{ "search" | relURL }}" class="btn btn--ghost">Browse all</a>
      </div>
    </div>
  </section>

</main>
{{ end }}

{{ define "scripts" }}
<script>
(async function () {
  // ── Bioluminescent particles (no external deps — runs first) ──
  var pContainer = document.getElementById('err404-particles');
  if (pContainer) {
    for (var i = 0; i < 32; i++) {
      var p = document.createElement('div');
      p.className = 'err404__particle';
      var size = 2 + Math.random() * 9;
      p.style.cssText = [
        'left:'   + (Math.random() * 100) + '%',
        'width:'  + size + 'px',
        'height:' + size + 'px',
        'animation-duration:' + (6 + Math.random() * 11) + 's',
        'animation-delay:'    + (-Math.random() * 15)    + 's',
        'opacity:'            + (0.10 + Math.random() * 0.38),
      ].join(';');
      pContainer.appendChild(p);
    }
  }

  // ── Extract meaningful terms from the URL path ──
  var stopWords = new Set([
    'the','a','an','and','or','of','in','to','for','with','on','at','from','by',
    'is','was','are','were','be','this','that','it','its','not','but','so','as'
  ]);
  // Strip .html / .htm so /404.html → /404 (which then filters as a number)
  var path = window.location.pathname.replace(/\.html?$/i, '');
  var terms = path
    .split(/[\/\-_]+/)
    .map(function (s) { return s.trim(); })
    .filter(function (s) { return s.length > 2 && !stopWords.has(s.toLowerCase()) && !/^\d+$/.test(s); })
    .join(' ')
    .trim();

  // ── Update hint text ──
  var hint = document.getElementById('err404-hint');
  if (hint) {
    hint.innerHTML = terms
      ? 'Showing results for <em>' + terms + '</em>'
      : 'Explore MBON content below.';
  }

  // ── Pagefind core API — same type-aware result cards as /search/
  //    (the Default UI, pagefind-ui.js, is deprecated as of 1.5.0). Guarded:
  //    the index may not exist in dev until `scripts/reindex.sh` runs. ──
  try {
    var pf = await import('{{ "pagefind/pagefind.js" | relURL }}');
    await pf.options({ baseUrl: '{{ "/" | relURL }}' });
    var BASE = '{{ "" | relURL }}'.replace(/\/+$/, '');
    function withBase(u) { if (!u) return u; if (u.charAt(0) !== '/') u = '/' + u; if (BASE && u.indexOf(BASE + '/') === 0) return u; return BASE + u; }
    var cap = function (s) { return s.charAt(0).toUpperCase() + s.slice(1); };
    var res = await pf.search(terms || null);
    var loaded = await Promise.all((res ? res.results : []).slice(0, 6).map(function (r) { return r.data(); }));
    var box = document.getElementById('search');
    if (box) {
      box.innerHTML = loaded.length ? '<ul class="search-widget__results">' + loaded.map(function (d) {
        var m = d.meta || {}, type = (m.type || 'page').toLowerCase(), badge = m.badge || cap(type);
        var thumb = m.image
          ? '<span class="search-result__media"><img src="' + m.image + '" alt="" loading="lazy"><span class="badge badge--solid badge--accent search-result__badge">' + badge + '</span></span>'
          : '<span class="search-result__kind">' + badge + '</span>';
        return '<li class="search-result search-result--' + type + (m.image ? ' search-result--media' : '') + '">' +
          (m.image ? thumb : '') +
          '<span class="search-result__main">' + (m.image ? '' : thumb) +
          '<a class="search-result__title" href="' + withBase(d.url) + '">' + m.title + '</a>' +
          '<p class="search-result__excerpt">' + d.excerpt + '</p></span></li>';
      }).join('') + '</ul>' : '';
    }
  } catch (e) {}
})();
</script>
{{ end }}
