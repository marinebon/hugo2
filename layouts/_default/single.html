{{ define "main" }}
<main>
  <section class="page-header">
    <div class="page-header__inner">
      <h1>{{ .Title }}</h1>
      {{ with .Params.summary }}<p class="page-header__lead">{{ . }}</p>{{ end }}
    </div>
  </section>
  <section class="section">
    <div class="container" style="max-width:720px;">{{ .Content }}</div>
  </section>
  {{/* pagefind tag filters */}}
  {{ if .Params.tags }}
  <div style="display:none" aria-hidden="true">
    {{ range .Params.tags }}
    {{ $parts := split . "." }}
    {{ if ge (len $parts) 2 }}
    <span data-pagefind-filter="{{ index $parts 0 }}:{{ strings.TrimPrefix (printf "%s." (index $parts 0)) . }}"></span>
    {{ end }}
    {{ end }}
  </div>
  {{ end }}
</main>
{{ end }}
