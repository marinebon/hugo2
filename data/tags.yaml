# Canonical tag registry for the whole site.
#
# Tags are written `facet.Value` in content front matter (e.g. method.Remote-Sensing).
# This file is the single source of truth for every facet:
# Tags are for FILTER & SEARCH only. Content TYPE is structural (the section) — not a
# tag. Page-to-page links use the `related:` front-matter field (content paths), NOT tags.
#
#   facet    machine prefix (drives color via --facet-<facet> / .tag--<facet>)
#   role     what kind of tag this facet is (see the two roles below)
#   label    human heading shown above a filter group
#   filters  sections whose filter-bar renders buttons for this facet
#            (year for papers is generated dynamically from the papers themselves)
#   values   curated filter-button values: { value, name } (name = display label)
#   aliases  display-name overrides for open-set values that have no button
#            (so org.GEOBON renders "GEO BON", not the humanized "Geobon")
#
# The two roles (semantic only — they do NOT change the contribution pipeline):
#   subtype    a finer type within ONE section; drives that section's filter (tool.*)
#   attribute  cross-cutting filter/browse axis (method/place/topic/year/org/portal)
#
# org vs portal: `org` = who BUILT a tool (developer, e.g. NOAA-IEA); `portal` = whose
# DATA a tool uses / where a dataset is served (OBIS/GBIF/EDI/ERDDAP). OBIS is a portal,
# not an org. Don't mint a `topic.*` that duplicates a method/place.
#
# Used by: layouts/partials/tag.html (label lookup over values+aliases),
#          layouts/tags/terms.html (flat facet /tags index),
#          layouts/tools|papers|data list.html (filter bars).
# To wire up a new filter button: add it to `values` here and to the matching
# dropdown in .github/ISSUE_TEMPLATE/add-*.yml.

- facet: portal
  label: Portal
  role: attribute
  filters: [data, tools]
  values:
    - { value: OBIS,   name: OBIS }
    - { value: GBIF,   name: GBIF }
    - { value: EDI,    name: EDI }
    - { value: ERDDAP, name: ERDDAP }

- facet: method
  label: Method
  role: attribute
  filters: [tools, papers, data]
  values:
    - { value: Remote-Sensing, name: "Remote Sensing" }
    - { value: Genomics,       name: Genomics }
    - { value: Acoustics,      name: Acoustics }
    - { value: Tracking,       name: Tracking }
    - { value: Indicators,     name: Indicators }
    - { value: Benthic,        name: Benthic }
    - { value: Traditional,    name: Traditional }
  aliases:
    Data-Mgmt: "Data Management"

- facet: tool
  label: Type
  role: subtype
  filters: [tools]
  values:
    - { value: Portal,      name: Portal }
    - { value: App,         name: App }
    - { value: Infographic, name: Infographic }
    - { value: Package,     name: Package }
    - { value: Protocol,    name: Protocol }
    - { value: Training,    name: Training }
    - { value: Workflow,    name: Workflow }

- facet: place
  label: Region
  role: attribute
  filters: [tools, data]
  values:
    - { value: Global,         name: Global }
    - { value: US,             name: "U.S." }
    - { value: Americas,       name: Americas }
    - { value: North-Atlantic, name: "N. Atlantic" }
    - { value: South-Florida,  name: "South FL" }
    - { value: Europe,         name: Europe }
    - { value: Arctic,         name: Arctic }
    - { value: Antarctic,      name: Antarctic }
    - { value: Monterey-Bay,   name: "Monterey Bay" }
    - { value: Bering-Sea,     name: "Bering Sea" }
    - { value: Coastal,        name: Coastal }
  aliases:
    Azores:  Azores
    Lisbon:  Lisbon
    Uruguay: Uruguay

- facet: org
  label: Organization
  role: attribute
  filters: [tools]
  values:
    - { value: NOAA-IEA,                  name: "NOAA IEA" }
    - { value: NationalMarineSanctuaries, name: "Nat'l Marine Sanctuaries" }
    - { value: FWRI,                      name: FWRI }
  aliases:
    GEOBON:      "GEO BON"
    FWBON:       FWBON
    MBON:        MBON
    NOAA:        NOAA
    IOOS:        IOOS
    GOOS:        GOOS
    UN:          UN
    UNEP:        UNEP
    UNESCO:      UNESCO
    Seabed2030:  "Seabed 2030"
    AIR-Centre:  "AIR Centre"

- facet: topic
  label: Topic
  role: attribute
  filters: []
  values: []
  aliases:
    EOV:                  EOV
    UN-Ocean-Decade:      "UN Ocean Decade"
    Marine-Life-2030:     "Marine Life 2030"
    Marine-Protected-Areas: "Marine Protected Areas"
    Muller-Karger:        "Müller-Karger"
    All-Atlantic:         "All-Atlantic"

- facet: year
  label: Year
  role: attribute
  filters: [papers]
  values: []
