{{ define "main" }}
<main>
  <section class="page-header">
    <div class="page-header__inner">
      <h1>Search</h1>
      <p class="page-header__lead">Find network nodes, products, news, and more.</p>
    </div>
  </section>
  <section class="section">
    <div class="container" style="max-width:720px;">
      <div id="search"></div>
    </div>
  </section>
</main>
{{ end }}
{{ define "scripts" }}
<link  href="{{ "pagefind/pagefind-ui.css" | relURL }}" rel="stylesheet">
<script src="{{ "pagefind/pagefind-ui.js"  | relURL }}"></script>
<script>
  const pf = new PagefindUI({ element: "#search", showSubResults: true });
  const q = new URLSearchParams(window.location.search).get('q');
  if (q) {
    // PagefindUI renders async — wait for its input to mount then trigger search
    const poll = setInterval(() => {
      const input = document.querySelector('#search input[type=text]');
      if (input) {
        clearInterval(poll);
        input.value = q;
        input.dispatchEvent(new Event('input', { bubbles: true }));
      }
    }, 50);
  }
</script>
{{ end }}
