name: 📅 Add an Event
description: Add a meeting, conference, workshop, webinar, or seminar.
title: "[Event] "
labels: ["content:event"]
body:
  - type: markdown
    attributes:
      value: |
        Add an event to the Events archive. On submit, a workflow drafts the page
        and opens a Pull Request for review.

        **Formatting basics** (for the Details field): `[link text](https://example.org)`,
        `**bold**`, and `- ` for bullet lists (e.g. one line per presentation).
  - type: input
    id: title
    attributes:
      label: Event title
      placeholder: National MBON Meeting
    validations:
      required: true
  - type: input
    id: date
    attributes:
      label: Start date
      description: YYYY-MM-DD (use the first day for multi-day events).
      placeholder: "2026-11-01"
    validations:
      required: true
  - type: input
    id: end_date
    attributes:
      label: End date (optional)
      description: YYYY-MM-DD, for multi-day events.
      placeholder: "2026-11-04"
  - type: input
    id: location
    attributes:
      label: Location (optional)
      placeholder: Monterey, CA
  - type: input
    id: event_url
    attributes:
      label: Event website (optional)
      placeholder: https://example.org/meeting
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence shown on the events listing card.
    validations:
      required: true
  - type: textarea
    id: body
    attributes:
      label: Details (optional)
      description: Agenda, presentation links, recordings — in Markdown. One link per line works well.
  - type: dropdown
    id: tags_topic
    attributes:
      label: Event type / topics
      multiple: true
      options:
        - Meeting
        - Conference
        - Workshop
        - Webinar
        - Seminar
        - Training
        - Symposium
  - type: dropdown
    id: tags_method
    attributes:
      label: Methods (optional)
      multiple: true
      options:
        - Remote Sensing
        - Genomics
        - Acoustics
        - Tracking
        - Indicators
        - Benthic
        - Traditional
  - type: input
    id: tags_other
    attributes:
      label: Other tags (advanced, optional)
      description: "Comma-separated facet.Value tags, e.g. `org.OBIS, place.Europe`."
  - type: markdown
    attributes:
      value: |
        ### What happens next
        A workflow opens a Pull Request with the new event file and links it here for
        a maintainer to review and merge.
