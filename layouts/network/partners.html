{{ define "main" }}
<main>
  <section class="page-header">
    <div class="page-header__inner">
      <h1>{{ .Title }}</h1>
      <p class="page-header__lead">{{ .Params.summary }}</p>
    </div>
  </section>
  <section class="section">
    <div class="container">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:var(--space-6);align-items:center;">
        {{ range hugo.Data.partners }}
        <a href="{{ .url }}" target="_blank" rel="noopener"
           style="display:flex;align-items:center;justify-content:center;padding:var(--space-4);border:1px solid var(--border);border-radius:var(--radius-md);transition:box-shadow var(--dur-base) var(--ease-out);"
           onmouseover="this.style.boxShadow='var(--shadow-lg)'" onmouseout="this.style.boxShadow=''">
          <img src="{{ .logo | relURL }}" alt="{{ .name }}" style="max-width:120px;max-height:60px;object-fit:contain;">
        </a>
        {{ end }}
      </div>
    </div>
  </section>
</main>
{{ end }}
