name: Content from issue

# Turn a submitted content Issue Form into a Pull Request:
#   resolve type -> parse form -> build markdown + import images -> open PR.
on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: content-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve content type
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.issue.labels || []).map(l => l.name);
            const title = context.payload.issue.title || '';
            const byLabel = {
              'content:news':  { type: 'news',  section: 'news' },
              'content:event': { type: 'event', section: 'events' },
              'content:paper': { type: 'paper', section: 'papers' },
              'content:tool':  { type: 'tool',  section: 'tools' },
              'content:edit':  { type: 'edit',  section: '' },
            };
            let hit = labels.map(l => byLabel[l]).find(Boolean);
            if (!hit) {
              if (title.startsWith('[News]'))  hit = byLabel['content:news'];
              else if (title.startsWith('[Event]')) hit = byLabel['content:event'];
              else if (title.startsWith('[Paper]')) hit = byLabel['content:paper'];
              else if (title.startsWith('[Tool]'))  hit = byLabel['content:tool'];
              else if (title.startsWith('Edit:'))    hit = byLabel['content:edit'];
            }
            if (!hit) { core.setOutput('skip', 'true'); return; }
            const tmpl = hit.type === 'edit' ? 'edit-content' : `add-${hit.type}`;
            core.setOutput('skip', 'false');
            core.setOutput('type', hit.type);
            core.setOutput('section', hit.section);
            core.setOutput('template', `.github/ISSUE_TEMPLATE/${tmpl}.yml`);

      - name: Checkout
        if: steps.meta.outputs.skip == 'false'
        uses: actions/checkout@v4

      - name: Parse issue form
        if: steps.meta.outputs.skip == 'false'
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: ${{ steps.meta.outputs.template }}

      - name: Set up Python
        if: steps.meta.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build content file
        if: steps.meta.outputs.skip == 'false'
        id: build
        env:
          ISSUE_JSON: ${{ steps.parse.outputs.jsonString }}
          CONTENT_TYPE: ${{ steps.meta.outputs.type }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python3 -m pip install --quiet pyyaml
          python3 scripts/issue_to_content.py

      - name: Open Pull Request
        if: steps.meta.outputs.skip == 'false' && steps.build.outputs.made_change == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.build.outputs.branch }}
          base: main
          title: ${{ steps.build.outputs.pr_title }}
          commit-message: ${{ steps.build.outputs.pr_title }}
          labels: content:generated
          delete-branch: true
          body: |
            Auto-generated from #${{ github.event.issue.number }}.

            - **File:** `${{ steps.build.outputs.file }}`
            - Review the front matter, tags, and any imported image, then merge.
            - Merging to `main` publishes the site automatically.

            Closes #${{ github.event.issue.number }}

      - name: Comment — PR opened
        if: steps.meta.outputs.skip == 'false' && steps.cpr.outputs.pull-request-number
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            🚀 Thanks! I drafted this into a pull request:
            **${{ steps.cpr.outputs.pull-request-url }}**

            A maintainer will review and merge it. Edit this issue to update the draft.

      - name: Comment — manual edit needed
        if: steps.meta.outputs.skip == 'false' && steps.meta.outputs.type == 'edit' && steps.build.outputs.made_change == 'false'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            Thanks! This edit needs a maintainer to apply it by hand (no full-content
            replacement block was provided).

            ${{ steps.build.outputs.content_path != '' && format('You can also edit it directly: https://github.com/{0}/edit/main/content/{1}', github.repository, steps.build.outputs.content_path) || '' }}
