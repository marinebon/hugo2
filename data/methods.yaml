- id: remote-sensing
  label: Remote Sensing
  icon: satellite
  x: 51
  y: 17
  summary: >
    Satellites and aerial sensors map ocean color, sea surface temperature, and
    habitat extent across millions of square kilometers — resolving patterns no
    ship survey could match at that scale. Seascapes products blend multi-sensor
    imagery into dynamic biodiversity indicators.
  url: methods/remote-sensing/

- id: benthic
  label: Benthic Surveys
  icon: border-all
  x: 14
  y: 46
  summary: >
    Rocky-shore and sandy-beach transects, photo quadrats, and intertidal surveys
    record coastal biodiversity — from barnacles and algae to shorebirds —
    using standardized protocols that make observations comparable across ocean basins.
  url: methods/benthic/

- id: traditional
  label: Traditional At-Sea Surveys
  icon: ship
  x: 66
  y: 27
  summary: >
    Trawl surveys, visual transects, and ship-based acoustic surveys remain the
    calibration backbone for modern methods. They are labor-intensive and costly at
    large scale — which is exactly why MBON invests in genomic, acoustic, and
    remote-sensing approaches that can extend coverage between cruises.
  url: methods/traditional/

- id: acoustics
  label: Acoustics
  icon: wave-square
  x: 42
  y: 63
  summary: >
    Passive acoustic monitoring (PAM) listens for biological and anthropogenic sound to
    infer biodiversity and ecosystem health. Active acoustics (echosounders, ADCPs)
    enumerate fish and zooplankton biomass, covering the water column continuously,
    day and night.
  url: methods/acoustics/

- id: tracking
  label: Tracking
  icon: location-dot
  x: 70
  y: 72
  summary: >
    Electronic tags on fish, turtles, marine mammals, and seabirds record fine-scale
    movements, diving behavior, and physiology. Acoustic and satellite telemetry build
    3-D pictures of how animals use ocean habitat — essential for understanding
    connectivity and response to climate change.
  url: methods/tracking/

- id: genomics
  label: Genomics & eDNA
  display: "GENOMICS & <span style=\"text-transform:none\">e</span>DNA"
  icon: dna
  x: 79
  y: 40
  summary: >
    Water and sediment samples contain DNA shed by every organism that passed through.
    Metabarcoding and metagenomics decode this environmental DNA to produce species
    inventories from a single water bottle — faster and cheaper than visual surveys
    for many taxa.
  url: methods/genomics/

- id: indicators
  label: Indicators & Data
  icon: chart-line
  x: 96
  y: 25
  summary: >
    Raw observations become decision-relevant information through synthesis into
    Essential Ocean Variables and Essential Biodiversity Variables. MBON's indicators
    and data-management working groups build reproducible pipelines that flow from
    every node into OBIS and the global biodiversity knowledge graph (FAIR data).
  url: methods/indicators/
