baseURL: https://marinebon.github.io/
locale: en-us
title: Marine Biodiversity Observation Network
summaryLength: 40
enableEmoji: false
# build future-dated content so upcoming Events (date in the future) are published
buildFuture: true

pagination:
  pagerSize: 9

params:
  # GitHub repo backing the contribution links (Suggest an edit / Edit on GitHub / Add forms)
  github_repo: marinebon/hugo2
  github_branch: main
  # Google Apps Script web-app /exec URL backing the Contact form (see scripts/contact-form.gs).
  # Leave empty until deployed; recipient emails live in the script, never on the site.
  contact_endpoint: ""
  description: A global collaborative initiative contributing to the effective management of marine biodiversity and ecosystem services. A thematic node of GEO BON.
  tagline: Global ocean observing · GEO BON node
  heroImage: img/photos/reef-sunlight.jpg
  heroHeadline: Observing life in the sea, across instruments and the globe
  heroLead: MBON integrates long-term programs into a connected, open and interoperable record of marine biodiversity — turning observations into products that inform conservation and policy worldwide.

